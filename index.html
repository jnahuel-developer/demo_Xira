<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#234a8a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Xira" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Xira</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const redirectKey = "gh-pages-path";
        const redirectUrl = window.sessionStorage.getItem(redirectKey);

        if (!redirectUrl) {
          return;
        }

        window.sessionStorage.removeItem(redirectKey);

        const currentUrl =
          window.location.pathname +
          window.location.search +
          window.location.hash;

        if (redirectUrl !== currentUrl) {
          window.history.replaceState(null, "", redirectUrl);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
